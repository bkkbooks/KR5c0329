body:
  text: 第一神砂石水神砂一斤研如粉細以井花水飛三次曬乾錦綵龍芽四兩苦酒一升入銀石器中同熬之酒盡爲度再以井水飛去錦綵龍芽草末日乾爲度後以膽石硝石各四兩同硏細後取活竹筒一箇大小得用所上取一丸約如彈大便取前藥研細膽石硝石一半在内以朱砂末入在内上更鋪地一半膽硝石末蓋之上以漆骨末九封口入隂地中三尺深埋四十九日取出成水傾入銀石器中其色光耀目又如人服之一蛤盞能則時盡退水澤穢立可長生目視鬼神無寒暑至百日外自覺身輕晝夜無𥧌不畏險阻舉步如飛越若風兩之疾至一年之外自有隂靈侍衛降虎伏龍預知萬事應若如神服二蛤盞九霄之上九地之下變化出沒無所不通無所不解自然靈聖服之三盞百日自然天眞之道脱離尸骸直超三界可作上仙之體證無爲物外之身也第二雄黄石水雄黄一斤研如細粉以井花水飛三次日晒乾以胡葱二兩苦酒三升同入銀石器中煮酒盡爲度入鋃石器中其色紅黄別無他効只可伏死一切飛走之物如或前法第五海浮石水海浮石一斤研如細粉以井花水飛三次用海帶二兩爲末苦酒三升同入銀石器中煑酒盡爲度耴出以井水飛去海帯末又以膽硝石各四兩同研細匀入藥如前法向隂地中五尺埋五十日成水取出傾入銀石器中其色異别無他効如人服之一蛤盞只可入水不溺服三蛤盞謁龍王自然於契矣第六水晶石水水晶石一斤研如粉細以井花水飛三次紅蓮花蘂四兩爲末苦酒三升同入銀石器中煑酒盡爲度取出傾入井水内飛去蓮蘂末以膽硝石各四兩同研如粉細匀入藥如前法於隂地中深埋三尺四十九日取出成水傾入鋃石器中其色光明瑩白如霜雪如人服之一蛤𧣴别無他効只可入火焚如履堅氷並無畏懼如人服之二蛤𧣴炎如盛炭卧着床席服之三蛤𧣴晝夜常坐火炙之中萬無一畏如常居止屋室也第七陽起石水陽起石一斤研細如粉以井花水飛三次用不灰木二兩爲細末苦酒三升同煑酒盡爲度取出井花水飛去不灰木末以膽硝石各四兩研細匀入藥如前法於向陽地中深埋三尺四十九日成水取出傾於銀石器中如人服之二蛤𧣴别無他効可離地百尺而可延年三百嵗第八玉石水玉石一斤先以鶴虱四兩五靈脂半斤淡漿一升同入磁器中浸三七日取玉石以鶴虱三兩五靈脂四兩苦酒三升入銀石器中同煑酒盡爲度以井花水飛去草末晒乾約半時間外其玉石作聲自然粉碎以膽硝石各四兩研細匀入藥如前法向隂地中三尺深埋四十九日取岀成水傾入銀石器中其色青塋如明光相似别無他効如人服之三蛤𧣴只可延壽一千歳乃眞玉液也第九金晶石水金晶石一斤研如粉細井花水飛三次以神草龍芽二兩苦酒三升入銀石器中煑酒盡爲度取出再以井水飛去神草龍芽末以膽硝石各四兩硏細匀入藥如前法入隂地中三尺深埋四十九日取岀成水傾入銀石器中其色黄深毎汞一斤入前藥水半蛤𧣴同攪匀少時其汞自乾如以火扇之自成金汁傾出自成赤金其色可愛别無他効第十銀晶石水銀晶石一斤研如粉細以井花水飛三次鶴頂草二兩爲末苦酒三升入銀石器中同煑酒盡爲度取出以井水飛去鶴虱草末膽硝石各四兩研細匀入藥如前法向陽地中三尺深埋三十日傾出入銀石器中其色如玉毎汞一斤入前水半蛤𧣴攪匀須㬰而乾如以氣扇之成上等好銀亦可㸃熟茆成寳矣第十一大青石水第十二大碌石水第十三白滑石水第十四砒霜石水第十五白礬石水第十六𥐼砂石水第十七硼砂石水第十八望精石水第十九寒水石水第二十井泉石水第二十一大赭石水右件水法造化同銀晶石做造只各加枸杞草木半兩煑皆只可乾汞㸃茆伏一切飛走之物悉皆伏火也第二十二磁烏石水磁烏石一斤研如粉細以井花水飛三次用蛇麻葉二兩爲末苦酒三升同入銀石器中煑酒盡爲度取出以井水飛去蛇麻葉末以膽硝石各四兩研細匀入藥依前法入隂地中深三尺埋四十九日成水取出傾入銀石器中其色黑瑩如人服之一蛤𧣴别無他効只可百刃交加之中其刃不能傷害也兼可破一切頑硬之物堅柔手到自然碎拆也第二十三醉茆信水取信三兩爲末置鐵釜中以盞合定入桑葉灰汁三斗下釜中文武火熬之火候調匀煎灰汁盡取岀藥入甘咼中煉之作汁傾岀研爲未使用碎茆取赤茆十兩熬作汁㸃藥一兩在內攪動候聲息時取出傾向滾酒內黑咼器再入咼依前熬之點自然成如此三徧自然如白雪每茆十兩入山澤艮六兩一處熬之自作西汁自然白也千火不變作造甚好白若凝脂嫩如春雪當可濟世千年不還也歌曰白玉霜逢灰汁熬神仙妙訣醉時茆生成別日分十褁曽持十兩用鍋熱熬成茆屑爲金汁汁内時時㸃白膠神光脫換爲眞物性還只在一千朝第二十四紫英石水紫英石一斤研如粉細以井花水飛三次以茜根二兩爲末同入苦酒三升入銀石器中煑酒盡爲度取出以井水飛去茜根末膽硝石各四兩同研細匀入藥如前法陽地中深埋三尺四十九日成水取出傾入銀石器中其色紅紫如人服之三蛤𧣴只可教毒酒不論盃數餘外別無他効第二十五烏石水烏石一斤硏如粉細以井花水飛三次呵子二兩爲未苦酒三升入銀石器中煑酒盡爲度取出以井水飛去呵子未膽硝石各四兩同研細入藥如前法向陽地中深埋三尺四十九日成水取出傾入銀石器中其色輝黑如人服之一蛤盞移時返老還童面有少容髮鬢如鴉去痾亦可延年三千歳别無他効第二十六禹餘粮石水餘粮石一斤研如粉細以并花水飛三次以瞿麥二兩爲末苦酒三升同入銀石器中煑酒盡爲度取出以井水飛去瞿麥末膽硝石各四兩研細匀入藥依前法向陽地中深埋三尺三十日成水取出傾入銀石器中只可變化黄白二物銀銅鐵錫先以慢火燒紅於前水中蘸之可應手而成赤金并能乾汞永成寶也又金芽石水金芽石一斤研如粉細以井花水飛三次以槐花子四兩爲末苦酒三升入銀石器中煑酒盡爲度取出以井水飛去槐末膽硝石各四兩硏細匀入藥如前法向隂地中深埋三尺四十九日成水取岀傾入銀石器中只可黜化黄白二物銀銅鐵錫向慢火中先燒紅入前水内蘸之可應手而成赤金也第二十七黃烏石水黄烏石一斤研如細粉以井花水飛三次百合二兩爲末苦酒三升入銀石器中煑酒盡爲度取岀以井花水飛去百合未膽硝石各四兩同研細匀如前法向陽地中深埋三尺四十九日成水取出傾入銀石器中只可變化黃白二物毎銀銅鐵錫先以慢火燒紅入前水内蘸之應聲而絶可立成赤金也第二十八麩金石水麩金石一斤研細以井花水飛三次仙靈脾四兩爲末苦酒三升入銀石器中煑酒盡爲度又以井水飛去仙靈脾末膽硝石各四兩硏細入藥如前法向隂地中三尺深埋四十九日成水取出傾入銀石器中其色深黄可變化黄白二物同前物水內蘸之候聲絶成紫金也第二十九紫雲毋石水紫雲母石一斤研如粉細以井花水飛三次遠志四兩爲末苦酒三升人銀石器中煑酒盡爲度取出以井水飛去遠志末膽硝石各四兩研細入藥如前法向隂地中三尺深埋四十九日成水取出傾入銀石器中只可變化黄白二物立成紫金之體其色異也第三十空青石水空青石一斤硏如粉細以井花水飛三次以降眞香二兩爲末苦酒三升入銀石器中煑酒盡爲度取出井水飛去降眞末膽硝石各四兩研細入藥依前法向陽地中深埋三尺四十九日成水取出傾在銀石器中其色碧如人服之一蛤盞以安息香擦於人中遇有危難亦在方位而去不復回顧使萬人之中皆不能見其體乃隱形之道也第三十一銀芽石水第三十二白母石水右二味法式同下項第一朱砂做造只各加入仙芽末一兩其變化靈驗並與神砂水同聖異不可一一具陳其物輕泄恐殃九祖龍芽易名辯證對節龍芽益母銀鬚龍芽葱地膽龍芽兎絲子伏砒點硫黃青樹龍芽春樹地盤龍芽荷葉花同道生龍芽编竹側栢龍芽栢子酉苗龍芽雞腸草已上伏製五金八石不失胎光仙力龍芽韭花寳龍芽牡丹異花龍芽芍藥玉汁龍芽萵苣金麥龍芽羊蹄無心龍芽半夏并砂點銅已上伏製丹陽成寳點赤金爲世寳金絲龍芽章柳金蘂龍芽菊花桑笋龍芽桑葉取霜㸃硫黄長生龍芽耐凍三黄龍芽地黃二氣龍芽荷葉伏汞仙衣龍芽松蘿製五金八石㸃化伏砂懸毬龍芽茄子點銅已上伏製硫黄不走紫金龍芽章柳碧玉龍芽竹木耳龍芽佛耳草白雪龍芽秃瘡草地錦龍芽衣斑天刃龍芽菖蒲慈砂龍芽南星味甘龍芽甘蔗星㸃銅已上伏製雄黄不走天焰龍芽蓮花耐凍龍芽夏枯草中央龍芽黄草青龍龍芽葛根蔓永青龍芽松金精龍芽大㦸纒樹龍芽凌霄花禽住龍芽舍松金色龍芽兎絲子玉英龍芽柳絮地丁龍芽車前子赤爪龍芽波菜帖索龍芽半甲味棠龍芽杜黎兒已上㐲製汞法朱砂九轉成大藥玉瓶龍芽蘿蔔五葉龍芽馬齒烏石龍芽黑荳淨土龍芽獨德菷金苑龍芽椒萬丈龍芽藤蘿圓紫龍芽仙靈脾地參龍芽知母甘露龍芽甘草紫背龍芽油㸃葉鹿茸龍芽藍葉作霜㸃砒已上並伏朱砂精英留連伏成寳金鈎龍芽酸棗金花龍芽五鳯龍芽管仲已上並伏五金八石成大藥通頂龍芽谷精草地骨龍芽枸杞已上伏朱砂異色而日如寳天寶龍芽赤芥懸豆龍芽槐角錦砂龍芽桑葉錦鎻龍芽㸃銅接續焰硝已上並同水浮龍芽浮萍虎爪龍芽萱草香爐龍芽紫蘇已上伏製硼砂㸃五金八石碎焰龍芽護宅草伏硇砂㸃金香附龍芽莎草根伏雄已上並同詩曰龍芽花發正當時採取根苗連葉枝依法製成眞大藥金石得見立降之軒轅黄帝水經藥法終
