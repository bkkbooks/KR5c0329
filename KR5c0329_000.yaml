front:
  text: 軒轅黃帝水經序如八蓋聞萬古之靈變化自別艮以一氣為初三才並立點化凡軀而成聖煉就凡石而成寶本自然也世間草木一秋而有變化人遇之服而延年千載何況萬年之變異為水豈不能超凡入聖本亦自然之理也昔徐久居山遍歷學場可謂煉丹而未滿長吁歎息而已因遊天台蓮溪洞邊見古仙不知何處人也古仙曰吾還丹妙訣君肯為之徐久稽首曰曽為之久矣未能得成古仙曰還不還勿勞心耳神仙之道自輕耳因於此從之五載後見古仙指草為龍方知其道矣稽首拜曰伏望吾師慈悲憫物伏濟沈淪未敢禮也願求一小術耳古仙曰子當證道而已天時已至吾有水經一卷可付於汝時古仙道言未畢忽覩三人齊至古仙曰此三人亦有分成道授於四人水經後不經半紀皆成其仙道得遇此水經者得成道了性三千餘人所有之藥所製之法皆按隂陽列篇于後聖異靈通變化無窮萬無失一時歲機稔甲子辰日序軒轅黃帝水經藥法
